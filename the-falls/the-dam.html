<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dam</title>
    <link rel="stylesheet" href="../styles/dam-styles.css">
    <link rel="stylesheet" href="../styles/sense-styles.css">
    <link rel="stylesheet" href="../styles/global-styles.css">
    <script src="../scripts/global.js" defer></script>
    <script src="../scripts/falls.js" defer></script>
</head>
<body>
    <div class="wrapper">
        <h1>The Hydroelectric Dam</h1>
        <div class="content">
            <div class="storyText">
                The structure is a hydroelectric dam. It uses the power of the falling water to spin turbines and generate electricity. 
                You make your way through the dark corridors, finally arriving at a room labeled CONTROL ROOM. Inside you see…SNAKES!
            </div>
            <div class="bigButtonHidden">
                <button class="bigButton" id="bigRedButton">Big Red Button</button>
            </div>
            <div class="snakeContainer">
                <img src="../images/snek.png" alt="Crudely drawn image of a snake" width="350" class="snake">
                <img src="../images/snek.png" alt="Crudely drawn image of a snake" width="350" class="snake">
                <img src="../images/snek.png" alt="Crudely drawn image of a snake" width="350" class="snake">
                <img src="../images/snek.png" alt="Crudely drawn image of a snake" width="350" class="snake">
            </div>
        </div>
        <div class="buttonContainer">
            <button class="senseButton" id="continueButton">Continue</button>
        </div>
        <div class="gameplayText">
            Click on the snakes to shoo them away.
        </div>
    </div>
</body>
</html>
