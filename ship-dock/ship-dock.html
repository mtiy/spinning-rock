<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ship Dock</title>
    <link rel="stylesheet" href="../styles/dock-styles.css">
    <link rel="stylesheet" href="../styles/sense-styles.css">
    <script src="../scripts/global.js" defer></script>
    <script src="../scripts/senses.js" defer></script>
</head>
<body>
    <div class="wrapper">
        <h1>Ship Dock</h1>
        <div class="content">
            <div id="listenText" class="senseText">You hear the creak of wood and the gentle crashing of waves.</div>
            <div id="lookText" class="senseText">You are standing on a dock. A <a href="boat.html">boat</a> sways next to you.</div>
            <div id="touchText" class="senseText">The wood is rough and rotten, worn down by salt water.</div>
            <div id="smellText" class="senseText">It smells like fish and seawater and damp wood.</div>
            <div id="tasteText" class="senseText">The seawater burns your throat. It is salty and acidic.</div>
        </div>
        <div class="buttonContainer">
            <button class="senseButton">Listen</button>
            <button class="senseButton">Look</button>
            <button class="senseButton">Touch</button>
            <button class="senseButton">Smell</button>
            <button class="senseButton">Taste</button>
        </div>
    </div>
    <div id="shipDock" class="link-container"></div>
</body>
</html>
