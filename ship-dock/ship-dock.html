<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ship Dock</title>
    <link rel="stylesheet" href="../styles/dock-styles.css">
    <link rel="stylesheet" href="../styles/sense-styles.css">
    <script src="../scripts/global.js" defer></script>
</head>
<body>
    <div class="wrapper">
        <h1>Ship Dock</h1>
        <div id="content">
            <div id="listen">
                <button id="listenButton" class="senseButton">Listen</button>
                <div id="listenText" class="senseText">You hear the creak of wood and the gentle crashing of waves.</div>
            </div>
            <div id="look">
                <button id="lookButton" class="senseButton">Look</button>
                <div id="lookText" class="senseText">You are standing on a dock. A <a href="">boat</a> sways next to you.</div>
            </div>
            <div id="touch">
                <button id="touchButton" class="senseButton">Touch</button>
                <div id="touchText" class="senseText">The wood is rough and rotten, worn down by salt water.</div>
            </div>
            <div id="smell">
                <button id="smellButton" class="senseButton">Smell</button>
                <div id="smellText" class="senseText">It smells like fish and seawater and damp wood.</div>
            </div>
            <div id="taste">
                <button id="tasteButton" class="senseButton">Taste</button>
                <div id="tasteText" class="senseText">The seawater burns your throat. It is salty and acidic.</div>
            </div>
        </div>
    </div>
</body>
</html>
