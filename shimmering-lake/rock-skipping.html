<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skipping Rocks</title>
    <link rel="stylesheet" href="../styles/sense-styles.css">
    <link rel="stylesheet" href="../styles/rock-skip-styles.css">
    <script src="../scripts/rock-skipping.js" defer></script>
</head>
<body>
    <div class="wrapper">
        <h1>Skipping Rocks</h1>
        <div class="content">
            <div class="storyText">
                You pick up the stone and stare at the moonlit lake. You feel compelled to throw it.
            </div>
            <div class="stoneContainer generic-centered-grid">
                <img src="../images/stone1.png" alt="A smooth, oval shaped gray stone" class="stone" id="oval">
                <img src="../images/stone2.png" alt="A bulky, sharp gray stone" class="stone" id="bulky">
                <img src="../images/stone3.png" alt="A porous gray stone" class="stone" id="porous">
                <img src="../images/stone4.png" alt="A smooth, slightly curved orange stone" class="stone" id="curved">
            </div>
            <div class="angleContainer generic-centered-grid">
                <img src="../images/angle1.png" alt="A picture of a 5 degree angle over the water" class="angle" id="5">
                <img src="../images/angle2.png" alt="A picture of a 20 degree angle over the water" class="angle" id="20">
                <img src="../images/angle3.png" alt="A picture of a 65 degree angle over the water" class="angle" id="65">
                <img src="../images/angle4.png" alt="A picture of a 165 degree angle over the water" class="angle" id="165">
            </div>
        </div>
        <div class="buttonContainer">
            <button class="senseButton" id="continueButton">Continue</button>
            <button class="senseButton" id="retryButton" hidden>Try Again</button>
        </div>
        <div class="gameplayText">
            Choose your stone
        </div>
    </div>
</body>
</html>
