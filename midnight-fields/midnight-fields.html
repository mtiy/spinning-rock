<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Fields</title>
    <link rel="stylesheet" href="../styles/field-styles.css">
    <link rel="stylesheet" href="../styles/sense-styles.css">
    <script src="../scripts/global.js" defer></script>
    <script src="../scripts/senses.js" defer></script>
</head>
<body>
    <div class="wrapper">
        <h1>Midnight Fields</h1>
        <div class="content">
            <div id="listenText" class="senseText">You hear the tallgrass swaying in the wind.</div>
            <div id="lookText" class="senseText">The fields are dark, rippling, endless. Above you the sky is filled with stars.</div>
            <div id="touchText" class="senseText">The grass is soft, and glides right through your hands.</div>
            <div id="smellText" class="senseText">A faint, <a href="flowers.html">sweet scent</a> wafts over to you. It seems to be coming from nearby.</div>
            <div id="tasteText" class="senseText">Grass tastes…bad. Yuck.</div>
        </div>
        <div class="buttonContainer">
            <button class="senseButton">Listen</button>
            <button class="senseButton">Look</button>
            <button class="senseButton">Touch</button>
            <button class="senseButton">Smell</button>
            <button class="senseButton">Taste</button>
        </div>
    </div>
    <div id="midnightFields" class="link-container"></div>
</body>
</html>
