<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Field</title>
    <link rel="stylesheet" href="../styles/sense-styles.css">
    <link rel="stylesheet" href="../styles/flower-styles.css">
    <link rel="stylesheet" href="../styles/global-styles.css">
    <script src="../scripts/global.js" defer></script>
    <script src="../scripts/flowers.js" defer></script>
</head>
<body>
    <div class="wrapper">
        <h1>Flower Field</h1>
        <div class="content">
            <div class="storyText">
                You follow the scent over a hill. Nestled below are patches of flowers, lit by moonlight.
            </div>
            <div class="flower-grid"></div>
        </div>
        <div class="buttonContainer">
            <button class="senseButton" id="continueButton">Continue</button>
        </div>
        <div class="gameplayText">
            Click the flowers to pick them
        </div>
    </div>
</body>
</html>
